name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Principle of least privilege: workflow only lints and builds local Docker
# images, never pushes. Read-only contents access is sufficient.
permissions:
  contents: read

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff (lenient — errors only, no style warnings)
        run: |
          ruff check backend/ --select=E9,F63,F7,F82 --output-format=github
        # E9 syntax errors, F63 pointless comparisons, F7 syntax, F82 undefined names
        # We skip style rules since this is a personal project

  test-python:
    name: Run pytest (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install backend deps
        # Tests mock Playwright/Anthropic/httpx so no browser install or API keys needed.
        run: pip install -r backend/requirements.txt
      - name: Run pytest
        env:
          DATABASE_URL: "sqlite:///:memory:"
        run: |
          pytest backend/tests/ \
            --ignore=backend/tests/verify_caching_live.py \
            --tb=short

  audit-deps:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    # Advisory only — don't block the build on CVEs in third-party deps that
    # we can't fix immediately. Rely on the GitHub Actions summary to flag them.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Scan backend/requirements.txt for known CVEs
        run: pip-audit -r backend/requirements.txt --strict

  build-docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Create minimal .env
        run: cp .env.example .env
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
